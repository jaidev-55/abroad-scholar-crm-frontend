name: Deploy Frontend to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            if [ ! -d "/root/abroad-scholar-frontend" ]; then
              git clone https://github.com/jaidev-55/abroad-scholar-crm-frontend.git /root/abroad-scholar-frontend
            fi

            cd /root/abroad-scholar-frontend
            git pull origin main

            docker build -t abroad-scholar-frontend .
            docker stop frontend || true
            docker rm frontend || true
            docker run -d \
              --name frontend \
              --restart always \
              -p 3000:80 \
              abroad-scholar-frontend

            echo "✅ Frontend deployed successfully!"